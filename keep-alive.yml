
name: Keep Supabase Alive
 
"on":
  schedule:
    - cron: '0 12 */4 * *'
  workflow_dispatch:
 
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://pknnhharadotkdvvkdoh.supabase.co/rest/v1/shelf_items?limit=1" \
            -H "apikey: sb_publishable_2Fw-nRJT74bovs1JSTBx_Q_zR-DgCPm" \
            -H "Authorization: Bearer sb_publishable_2Fw-nRJT74bovs1JSTBx_Q_zR-DgCPm")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status code $STATUS"
            exit 1
          fi
 
